buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        // Skia's MakeImageFromNativeBuffer + AHardwareBuffer path is gated
        // on `__ANDROID_API__ >= 26` in its prefab build; the example app
        // and any consumer that wants the zero-copy compose-on-clip path
        // must compile with minSdk 26+.
        minSdkVersion = 26
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
