compressionLevel: mixed

enableGlobalCache: false

nodeLinker: node-modules

# Use npmjs.org for BOTH installs and publishes — a single registry, so a
# single auth slot in ~/.yarnrc.yml. Yarn's built-in default npmRegistryServer
# is the read-only registry.yarnpkg.com mirror; leaving it in place created a
# two-registry split where `yarn npm login` refreshed only the (default) mirror
# slot and never the publish slot, so the publish credential silently drifted
# and 404'd every release. Overriding the default to npmjs.org collapses that:
# `yarn npm login` now refreshes exactly the slot `yarn npm publish` consumes.
# (npmPublishRegistry is therefore redundant and intentionally dropped.)
# yarn.lock records protocol resolutions (pkg@npm:x.y.z), not registry hosts,
# so this does not churn the lockfile or affect `yarn install --immutable`.
npmRegistryServer: "https://registry.npmjs.org"
